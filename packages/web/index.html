<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1024, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f7fa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)" />
    <title>Homelhar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!--
      FOUC prevention: read the persisted theme before any paint and apply
      both `.dark` (toggles our token scope) and `color-scheme` (themes
      browser-native widgets like scrollbars and form controls). Wrapped in
      try/catch so a missing/corrupt localStorage never blocks render.
    -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('hcc-theme');
          var mode = 'system';
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && parsed.state && parsed.state.theme) mode = parsed.state.theme;
          }
          var isDark = mode === 'dark' ||
            (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var html = document.documentElement;
          if (isDark) html.classList.add('dark');
          html.style.colorScheme = isDark ? 'dark' : 'light';
        } catch (_) {}
      })();
    </script>
  </head>
  <body class="font-body antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
